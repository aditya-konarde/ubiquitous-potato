<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 320px; font-family: system-ui, sans-serif; background: #0f0f0f; color: #e1e1e1; padding: 16px; }
h1 { font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
h1 span { font-size: 20px; }
.add-row { display: flex; gap: 8px; margin-bottom: 16px; }
input { flex: 1; padding: 8px 10px; border: 1px solid #333; border-radius: 6px; background: #1a1a1a; color: #e1e1e1; font-size: 13px; outline: none; }
input:focus { border-color: #ff4444; }
button { padding: 8px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
#addBtn { background: #ff4444; color: #fff; }
#addBtn:hover { background: #cc3333; }
.list { max-height: 300px; overflow-y: auto; }
.item { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; background: #1a1a1a; border-radius: 6px; margin-bottom: 6px; font-size: 13px; }
.item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.item .rm { background: none; border: none; color: #666; cursor: pointer; font-size: 18px; padding: 0 4px; }
.item .rm:hover { color: #ff4444; }
.empty { color: #555; font-size: 13px; text-align: center; padding: 24px 0; }
.hint { font-size: 11px; color: #555; margin-bottom: 12px; }
#current { margin-bottom: 14px; display: none; }
#current button { width: 100%; padding: 10px; background: #ff4444; color: #fff; font-size: 13px; border-radius: 6px; }
#current button:hover { background: #cc3333; }
#current .done { text-align: center; color: #4caf50; font-size: 12px; padding: 6px 0; }
.import { margin-top: 12px; border-top: 1px solid #222; padding-top: 10px; }
.import a { display: block; text-align: center; padding: 6px; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; color: #888; font-size: 12px; cursor: pointer; font-weight: 600; text-decoration: none; }
.import a:hover { color: #e1e1e1; border-color: #555; }
</style>
</head>
<body>
<h1><span>🚫</span> YouNope</h1>
<div id="current"></div>
<p class="hint">Enter channel name or @handle exactly as shown on YouTube.</p>
<div class="add-row">
  <input id="input" type="text" placeholder="@ChannelHandle or Channel Name">
  <button id="addBtn">Block</button>
</div>
<div id="list" class="list"></div>
<div class="import">
  <a id="settingsLink" href="#">⬆ Import list</a>
</div>
<script src="popup.js"></script>
</body>
</html>
